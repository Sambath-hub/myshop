<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ShopZone</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body style="background-color: #f4f7f6;">
    <header class="header">
        <nav class="nav">
            <a href="index.html" class="logo"><i class="fas fa-shopping-bag"></i> ShopZone</a>
            <div class="nav-items">
                <a href="index.html">Home</a>
                <a href="product.html">Products</a>
                <a href="about.html">About</a>
                <a href="contact.html" class="active" style="color: #3498db; font-weight: 700;">Contact</a>
            </div>
        </nav>
    </header>

    <main style="padding: 120px 20px;">
        <div style="max-width: 1100px; margin: 0 auto; display: flex; gap: 50px; flex-wrap: wrap;">
            
            <div style="flex: 1; min-width: 320px;">
                <h1 style="font-size: 3rem; color: #2c3e50; margin-bottom: 10px;">Contact Us</h1>
                <p style="color: #7f8c8d; margin-bottom: 40px; font-size: 1.1rem;">Have a question about an order? Want to say hi? Send us a message and our team will respond within 24 hours.</p>
                
                <div style="margin-bottom: 30px; display: flex; align-items: flex-start; gap: 20px;">
                    <div style="width: 50px; height: 50px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                        <i class="fas fa-envelope" style="color: #3498db;"></i>
                    </div>
                    <div>
                        <h4 style="margin-bottom: 5px;">Email Us</h4>
                        <p style="color: #7f8c8d;">support@shopzone.com</p>
                    </div>
                </div>

                <div style="margin-bottom: 30px; display: flex; align-items: flex-start; gap: 20px;">
                    <div style="width: 50px; height: 50px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                        <i class="fas fa-phone" style="color: #2ecc71;"></i>
                    </div>
                    <div>
                        <h4 style="margin-bottom: 5px;" link="016633298">Call Us</h4>
                        <p style="color: #7f8c8d;">+885: 16-633-298</p>
                    </div>
                </div>
            </div>

            <div style="flex: 1.5; min-width: 320px; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.05);">
                <form id="contactForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div>
                            <label style="display:block; margin-bottom: 8px; font-weight: 600;">Name</label>
                            <input type="text" placeholder="John Doe" required style="width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; background: #fdfdfd;">
                        </div>
                        <div>
                            <label style="display:block; margin-bottom: 8px; font-weight: 600;">Email</label>
                            <input type="email" placeholder="john@example.com" required style="width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; background: #fdfdfd;">
                        </div>
                    </div>
                    <div style="margin-bottom: 25px;">
                        <label style="display:block; margin-bottom: 8px; font-weight: 600;">Message</label>
                        <textarea placeholder="Tell us how we can help..." rows="6" required style="width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; background: #fdfdfd; font-family: inherit;"></textarea>
                    </div>
                    <button type="submit" style="width: 100%; background: #3498db; color: white; border: none; padding: 18px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s;">
                        Send Message <i class="fas fa-paper-plane" style="margin-left: 10px;"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('contactForm').onsubmit = (e) => {
            e.preventDefault();
            alert("Success! Your message has been sent. We will get back to you shortly.");
            e.target.reset();
        };
    </script>
</body>
</html>
